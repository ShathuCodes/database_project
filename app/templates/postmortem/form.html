{% extends 'base.html' %}
{% block title %}{{ action }} Postmortem — Forensic MIS{% endblock %}
{% block page_title %}{{ action }} Postmortem{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="fw-bold mb-0">{{ action }} Postmortem Record</h5>
  <a href="{{ url_for('postmortem.list_pm') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>

<div class="table-card p-4" style="max-width:720px">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Case <span class="text-danger">*</span></label>
        <select name="case_id" class="form-select" required>
          <option value="">— Select Case —</option>
          {% for c in cases %}
          <option value="{{ c.case_id }}"
            {{ 'selected' if record and record.case_id == c.case_id }}>{{ c.case_number }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Doctor</label>
        <select name="doctor_id" class="form-select">
          <option value="">— Select Doctor —</option>
          {% for d in doctors %}
          <option value="{{ d.staff_id }}"
            {{ 'selected' if record and record.doctor_id == d.staff_id }}>{{ d.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold small">Examination Date</label>
        <input type="date" name="exam_date" class="form-control"
               value="{{ record.exam_date if record else '' }}">
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold small">Manner of Death</label>
        <select name="manner_of_death" class="form-select">
          <option value="">— Select —</option>
          {% for m in manners %}
          <option value="{{ m }}"
            {{ 'selected' if record and record.manner_of_death == m }}>{{ m }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold small">Body Condition</label>
        <input type="text" name="body_condition" class="form-control"
               value="{{ record.body_condition if record else '' }}">
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Cause of Death</label>
        <input type="text" name="cause_of_death" class="form-control"
               value="{{ record.cause_of_death if record else '' }}">
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Findings</label>
        <textarea name="findings" class="form-control" rows="4">{{ record.findings if record else '' }}</textarea>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Notes</label>
        <textarea name="notes" class="form-control" rows="2">{{ record.notes if record else '' }}</textarea>
      </div>
      <div class="col-12 d-flex gap-2 pt-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ action }} Record
        </button>
        <a href="{{ url_for('postmortem.list_pm') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
