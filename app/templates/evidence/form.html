{% extends 'base.html' %}
{% block title %}{{ action }} Specimen — Forensic MIS{% endblock %}
{% block page_title %}{{ action }} Specimen{% endblock %}

{% block content %}
<div class="section-card" style="max-width:720px;">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-12">
        <label class="form-label small fw-semibold">Medico-Legal Event *</label>
        <select name="event_id" class="form-select" required>
          {% for e in events %}
          <option value="{{ e.event_id }}" {{ 'selected' if record and record.event_id==e.event_id }}>
            {{ e.case_number }} — {{ e.event_type }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Specimen Type *</label>
        <input type="text" name="specimen_type" class="form-control" required value="{{ record.specimen_type if record else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Specimen Label</label>
        <input type="text" name="specimen_label" class="form-control" maxlength="10" placeholder="A, B, C..." value="{{ record.specimen_label if record else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Collection Date/Time</label>
        <input type="datetime-local" name="collection_date" class="form-control"
               value="{{ record.collection_date.strftime('%Y-%m-%dT%H:%M') if record and record.collection_date else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Seal No.</label>
        <input type="text" name="seal_no" class="form-control" value="{{ record.seal_no if record else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Chain of Custody Status</label>
        <input type="text" name="chain_of_custody_status" class="form-control"
               placeholder="e.g. Collected / Sent to Government Analyst" value="{{ record.chain_of_custody_status if record else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Production Number</label>
        <input type="text" name="production_number" class="form-control" value="{{ record.production_number if record else '' }}">
      </div>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ action }} Specimen</button>
      <a href="{{ url_for('evidence.list_evidence') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
