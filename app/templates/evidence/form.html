{% extends 'base.html' %}
{% block title %}{{ action }} Evidence — Forensic MIS{% endblock %}
{% block page_title %}{{ action }} Evidence{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="fw-bold mb-0">{{ action }} Evidence</h5>
  <a href="{{ url_for('evidence.list_evidence') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>

<div class="table-card p-4" style="max-width:720px">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Case <span class="text-danger">*</span></label>
        <select name="case_id" class="form-select" required>
          <option value="">— Select Case —</option>
          {% for c in cases %}
          <option value="{{ c.case_id }}"
            {{ 'selected' if record and record.case_id == c.case_id }}>{{ c.case_number }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Evidence Type <span class="text-danger">*</span></label>
        <input type="text" name="evidence_type" class="form-control" required
               value="{{ record.evidence_type if record else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Status</label>
        <select name="status" class="form-select">
          {% for s in ev_statuses %}
          <option value="{{ s }}"
            {{ 'selected' if record and record.status == s or (not record and s == 'In Storage') }}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Collected Date</label>
        <input type="date" name="collected_date" class="form-control"
               value="{{ record.collected_date if record else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Collected By</label>
        <input type="text" name="collected_by" class="form-control"
               value="{{ record.collected_by if record else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Storage Location</label>
        <input type="text" name="storage_location" class="form-control"
               value="{{ record.storage_location if record else '' }}">
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Description</label>
        <textarea name="description" class="form-control" rows="2">{{ record.description if record else '' }}</textarea>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Chain of Custody</label>
        <textarea name="chain_of_custody" class="form-control" rows="2">{{ record.chain_of_custody if record else '' }}</textarea>
      </div>
      <div class="col-12 d-flex gap-2 pt-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ action }} Evidence
        </button>
        <a href="{{ url_for('evidence.list_evidence') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
