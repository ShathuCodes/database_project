{% extends 'base.html' %}
{% block title %}{{ code }} {{ message }} — Forensic MIS{% endblock %}
{% block page_title %}Error {{ code }}{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center py-5 text-center">
  <div style="font-size:5rem; line-height:1; font-weight:800; color:#e2e8f0;">{{ code }}</div>
  <h4 class="fw-bold mt-3 mb-2 text-dark">{{ message }}</h4>
  <p class="text-muted mb-4">{{ detail }}</p>
  <a href="{{ url_for('dashboard.home') }}" class="btn btn-primary">
    <i class="bi bi-house me-2"></i>Back to Dashboard
  </a>
</div>
{% endblock %}
