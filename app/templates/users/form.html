{% extends 'base.html' %}
{% block title %}{{ action }} User — Forensic MIS{% endblock %}
{% block page_title %}{{ action }} User Account{% endblock %}

{% block content %}
<div class="section-card" style="max-width:640px;">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-12">
        <label class="form-label small fw-semibold">Username *</label>
        <input type="text" name="username" class="form-control" required value="{{ record.username if record else '' }}">
      </div>
      <div class="col-md-12">
        <label class="form-label small fw-semibold">Password {{ '(leave blank to keep unchanged)' if record else '*' }}</label>
        <input type="password" name="password" class="form-control" {{ 'required' if not record }}>
      </div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Role *</label>
        <select name="role_id" class="form-select" required>
          {% for r in roles %}
          <option value="{{ r.role_id }}" {{ 'selected' if record and record.role_id==r.role_id }}>{{ r.role_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Linked Staff (optional)</label>
        <select name="staff_id" class="form-select">
          <option value="">— None —</option>
          {% for s in staff %}
          <option value="{{ s.staff_id }}" {{ 'selected' if record and record.staff_id==s.staff_id }}>{{ s.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="is_active" id="is_active"
                 {{ 'checked' if not record or record.is_active }}>
          <label class="form-check-label" for="is_active">Account Active</label>
        </div>
      </div>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ action }} User</button>
      <a href="{{ url_for('users.list_users') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
