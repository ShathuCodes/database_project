{% extends 'base.html' %}
{% block title %}Add User — Forensic MIS{% endblock %}
{% block page_title %}Add User{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h5 class="fw-bold mb-0">Add User Account</h5>
  <a href="{{ url_for('users.list_users') }}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back
  </a>
</div>

<div class="table-card p-4" style="max-width:600px">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Username <span class="text-danger">*</span></label>
        <input type="text" name="username" class="form-control" required
               value="{{ record.username if record else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold small">Role <span class="text-danger">*</span></label>
        <select name="role" class="form-select" required>
          <option value="">— Select Role —</option>
          {% for r in uroles %}
          <option value="{{ r }}" {{ 'selected' if record and record.role == r }}>{{ r }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12">
        <label class="form-label fw-semibold small">Linked Staff Member</label>
        <select name="staff_id" class="form-select">
          <option value="">— None —</option>
          {% for s in staff_list %}
          <option value="{{ s.staff_id }}"
            {{ 'selected' if record and record.staff_id == s.staff_id }}>{{ s.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      {% if action == 'Add' %}
      <div class="col-12">
        <label class="form-label fw-semibold small">Password <span class="text-danger">*</span></label>
        <input type="password" name="password" class="form-control" minlength="6" required
               placeholder="Minimum 6 characters">
      </div>
      {% endif %}
      <div class="col-12 d-flex gap-2 pt-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-1"></i>{{ action }} User
        </button>
        <a href="{{ url_for('users.list_users') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
