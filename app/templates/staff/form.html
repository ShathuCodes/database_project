{% extends 'base.html' %}
{% block title %}{{ action }} Staff — Forensic MIS{% endblock %}
{% block page_title %}{{ action }} Staff Member{% endblock %}

{% block content %}
<div class="section-card" style="max-width:640px;">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-12">
        <label class="form-label small fw-semibold">Full Name *</label>
        <input type="text" name="full_name" class="form-control" required value="{{ record.full_name if record else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Designation *</label>
        <select name="designation" class="form-select" required>
          {% for d in designations %}
          <option value="{{ d }}" {{ 'selected' if record and record.designation==d }}>{{ d }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">SLMC Reg. No.</label>
        <input type="text" name="slmc_regno" class="form-control" value="{{ record.slmc_regno if record else '' }}">
      </div>
      <div class="col-md-12">
        <label class="form-label small fw-semibold">Qualification</label>
        <input type="text" name="qualification" class="form-control" value="{{ record.qualification if record else '' }}">
      </div>
      <div class="col-md-12">
        <label class="form-label small fw-semibold">Station</label>
        <input type="text" name="station" class="form-control" value="{{ record.station if record else '' }}">
      </div>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ action }} Staff Member</button>
      <a href="{{ url_for('staff.list_staff') }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
